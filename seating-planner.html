<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seating Planner — Christy & Mitchell</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<!-- Loads SUPABASE_URL / SUPABASE_ANON_KEY onto window from Vercel env vars -->
<script src="/api/config.js"></script>
<style>
  :root {
    --bg: #EAE5DB;
    --bg-card: #F2EDE5;
    --bg-panel: #F7F3EE;
    --text: #2C2820;
    --text-mid: #5A4E45;
    --text-light: #8A7E77;
    --accent: #7A4F5A;
    --accent-light: #C4A0AB;
    --olive: #686B38;
    --divider: #C8BFB2;
    --white: #FAF7F2;
    --table-empty: #E4DDD4;
    --table-full: #A09890;
    --drag-over: rgba(122,79,90,0.12);
    --shadow: 0 2px 16px rgba(44,40,32,0.08);
    --error: #8B3A3A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── AUTH GATE ─── */
  .auth-gate {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    background: var(--bg);
    padding: 2rem;
  }
  .auth-card {
    background: var(--bg-card);
    border: 1px solid var(--divider);
    padding: 2.5rem 2rem;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }
  .auth-card h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 400;
    margin-bottom: 0.6rem;
  }
  .auth-card p {
    color: var(--text-mid);
    font-size: 0.85rem;
    margin-bottom: 1.4rem;
    line-height: 1.5;
  }
  .auth-input {
    width: 100%;
    padding: 0.6rem 0.8rem;
    background: var(--bg);
    border: 1px solid var(--divider);
    font-family: 'Raleway', sans-serif;
    font-size: 0.85rem;
    color: var(--text);
    outline: none;
    margin-bottom: 0.8rem;
  }
  .auth-input:focus { border-color: var(--text-mid); }
  .auth-btn {
    width: 100%;
    padding: 0.7rem;
    background: var(--text);
    color: var(--bg);
    border: none;
    font-family: 'Raleway', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-btn:hover:not(:disabled) { background: var(--text-mid); }
  .auth-msg {
    margin-top: 1rem;
    font-size: 0.78rem;
    color: var(--text-mid);
    line-height: 1.5;
  }
  .auth-msg.error { color: var(--error); }

  /* ─── HEADER ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.7rem 1.5rem;
    background: var(--bg-card);
    border-bottom: 1px solid var(--divider);
    flex-shrink: 0;
    gap: 1rem;
  }
  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
  }
  .header-title em { font-style: italic; color: var(--text-mid); }
  .header-meta {
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-top: 0.1rem;
  }
  .header-stats { display: flex; gap: 1.5rem; align-items: center; }
  .stat-chip {
    text-align: center;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-light);
  }
  .stat-chip strong {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    color: var(--text);
    line-height: 1;
    margin-bottom: 0.1rem;
    letter-spacing: 0;
  }
  .header-actions { display: flex; gap: 0.6rem; align-items: center; }
  .who { font-size: 0.62rem; letter-spacing: 0.12em; color: var(--text-light); margin-right: 0.4rem; }
  .btn {
    padding: 0.5rem 1rem;
    font-family: 'Raleway', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--divider);
    background: transparent;
    color: var(--text-mid);
    transition: background 0.15s, color 0.15s;
  }
  .btn:hover { background: var(--text); color: var(--bg); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { background: var(--text-mid); border-color: var(--text-mid); }

  /* Sync indicator */
  .sync-indicator {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-light);
    transition: color 0.2s;
  }
  .sync-indicator.saving { color: var(--accent); }
  .sync-indicator.saved  { color: var(--olive); }
  .sync-indicator.error  { color: var(--error); }

  /* ─── LAYOUT ─── */
  .app-body { display: flex; flex: 1; overflow: hidden; }

  /* ─── LEFT PANEL ─── */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--bg-panel);
    border-right: 1px solid var(--divider);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header { padding: 1rem; border-bottom: 1px solid var(--divider); flex-shrink: 0; }
  .sidebar-title {
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 0.6rem;
  }
  .filter-row { display: flex; gap: 0.4rem; margin-bottom: 0.4rem; }
  .filter-chip {
    flex: 1;
    padding: 0.35rem 0.5rem;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    background: transparent;
    border: 1px solid var(--divider);
    color: var(--text-mid);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .filter-chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .search-input {
    width: 100%;
    padding: 0.4rem 0.6rem;
    background: var(--bg-card);
    border: 1px solid var(--divider);
    font-family: 'Raleway', sans-serif;
    font-size: 0.7rem;
    color: var(--text);
    outline: none;
  }
  .search-input:focus { border-color: var(--text-mid); }

  .guest-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem;
  }
  .guest-list::-webkit-scrollbar { width: 4px; }
  .guest-list::-webkit-scrollbar-track { background: transparent; }
  .guest-list::-webkit-scrollbar-thumb { background: var(--divider); }

  .group-label {
    padding: 0.6rem 0.6rem 0.3rem;
    font-size: 0.56rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-light);
    font-weight: 600;
  }

  .guest-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.45rem 0.6rem;
    margin-bottom: 0.25rem;
    background: var(--bg-card);
    border: 1px solid transparent;
    cursor: grab;
    transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
    user-select: none;
  }
  .guest-item:hover { border-color: var(--divider); }
  .guest-item.dragging { opacity: 0.5; cursor: grabbing; }
  .guest-item.seated { opacity: 0.45; background: var(--bg); }
  .guest-item.declined { opacity: 0.35; text-decoration: line-through; }
  .guest-item.hidden { display: none; }
  .guest-avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    font-weight: 600;
    flex-shrink: 0;
    color: white;
  }
  .guest-name {
    flex: 1;
    font-size: 0.74rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .guest-side {
    font-size: 0.6rem;
    color: var(--text-light);
    flex-shrink: 0;
  }
  .guest-seat-label {
    font-size: 0.56rem;
    color: var(--text-light);
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }

  /* ─── FLOOR PLAN ─── */
  .floor-plan { flex: 1; overflow: auto; padding: 1.5rem; position: relative; }
  .floor-plan::-webkit-scrollbar { width: 6px; height: 6px; }
  .floor-plan::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 3px; }
  .room-label {
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 1rem;
  }
  .tables-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.2rem;
  }

  /* ─── TABLE CARD ─── */
  .table-card {
    background: var(--bg-card);
    border: 1px solid var(--divider);
    padding: 0.8rem;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .table-card.full { border-color: var(--table-full); }

  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .table-name {
    font-size: 0.7rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-mid);
    font-weight: 600;
  }
  .table-count { font-size: 0.6rem; letter-spacing: 0.08em; color: var(--text-light); }
  .table-count.at-capacity { color: var(--accent); font-weight: 600; }

  /* Round table SVG */
  .table-visual { display: flex; justify-content: center; margin-bottom: 0.6rem; }
  .table-visual svg { display: block; }

  /* 12 numbered seat slots */
  .seats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 3px;
  }
  .seat-slot {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 6px;
    background: var(--bg);
    border: 1px solid var(--divider);
    font-size: 0.62rem;
    color: var(--text-mid);
    min-height: 22px;
    transition: border-color 0.15s, background 0.15s;
  }
  .seat-slot.drag-over {
    border-color: var(--accent);
    background: var(--drag-over);
  }
  .seat-slot.empty { color: var(--text-light); font-style: italic; }
  .seat-slot.filled { cursor: grab; background: var(--bg-card); }
  .seat-slot.dragging { opacity: 0.4; }

  .seat-num {
    font-size: 0.55rem;
    color: var(--text-light);
    flex-shrink: 0;
    min-width: 12px;
    letter-spacing: 0.04em;
  }
  .seat-name-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }
  .seat-remove {
    font-size: 0.7rem;
    color: var(--text-light);
    cursor: pointer;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    padding: 0 2px;
  }
  .seat-slot.filled:hover .seat-remove { opacity: 1; }
  .seat-remove:hover { color: var(--error); }

  /* ─── PRINT ─── */
  @media print {
    .sidebar, header .header-actions, .auth-gate { display: none; }
    body { overflow: auto; height: auto; }
    .app-body { overflow: visible; }
    .floor-plan { overflow: visible; }
  }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(44,40,32,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--divider);
    padding: 2rem;
    max-width: 520px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    margin-bottom: 1.2rem;
  }
  .modal-table-summary { margin-bottom: 0.6rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--divider); }
  .modal-table-summary:last-child { border-bottom: none; }
  .mts-name {
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--text-mid);
  }
  .mts-guests { font-size: 0.72rem; color: var(--text); margin-top: 0.25rem; line-height: 1.6; }
  .modal-close {
    margin-top: 1.5rem;
    width: 100%;
    padding: 0.7rem;
    background: var(--text);
    color: var(--bg);
    border: none;
    font-family: 'Raleway', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- ─── AUTH GATE ─── -->
<div id="auth-gate" class="auth-gate">
  <div class="auth-card">
    <h1>Seating Planner</h1>
    <p>Christy &amp; Mitchell — admin only.<br>Sign in via magic link.</p>
    <input type="email" class="auth-input" id="auth-email" placeholder="Your email">
    <button class="auth-btn" id="auth-btn" onclick="sendMagicLink()">Send Magic Link</button>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- ─── APP (hidden until authenticated) ─── -->
<div id="app" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
  <header>
    <div>
      <div class="header-title">Seating Planner — <em>Christy &amp; Mitchell</em></div>
      <div class="header-meta">November 12, 2026 · The Salisbury Room, Peninsula Hong Kong</div>
    </div>
    <div class="header-stats">
      <div class="stat-chip"><strong id="stat-total">0</strong>Guests</div>
      <div class="stat-chip"><strong id="stat-seated">0</strong>Seated</div>
      <div class="stat-chip"><strong id="stat-unassigned">0</strong>Unassigned</div>
      <div class="stat-chip"><strong>15</strong>Tables</div>
    </div>
    <div class="header-actions">
      <span class="who" id="who"></span>
      <span class="sync-indicator" id="sync"></span>
      <button class="btn" onclick="reload()">Reload</button>
      <button class="btn" onclick="openSummary()">Summary</button>
      <button class="btn" onclick="signOut()">Sign Out</button>
      <button class="btn btn-primary" onclick="window.print()">Print</button>
    </div>
  </header>

  <div class="app-body">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Guests</div>
        <div class="filter-row">
          <button class="filter-chip active" data-filter="unassigned" onclick="setFilter('unassigned')">Unassigned</button>
          <button class="filter-chip" data-filter="all" onclick="setFilter('all')">All</button>
          <button class="filter-chip" data-filter="seated" onclick="setFilter('seated')">Seated</button>
        </div>
        <input type="text" class="search-input" id="search-input" placeholder="Search by name…" oninput="renderSidebar()">
      </div>
      <div class="guest-list" id="guest-list"
        ondragover="event.preventDefault()"
        ondrop="dropOnSidebar(event)">
      </div>
    </div>

    <!-- Floor plan -->
    <div class="floor-plan">
      <div class="room-label">The Salisbury Room · Floor Plan</div>
      <div class="tables-grid" id="tables-grid"></div>
    </div>
  </div>
</div>

<!-- Summary modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>Seating Summary</h3>
    <div id="modal-content"></div>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
// ─── SUPABASE CONFIG ───
// Values injected by /api/config.js (reads from Vercel env vars).
const SUPABASE_URL      = (typeof window !== 'undefined' && window.SUPABASE_URL)      || '';
const SUPABASE_ANON_KEY = (typeof window !== 'undefined' && window.SUPABASE_ANON_KEY) || '';

const ADMIN_ALLOWLIST = [
  'christychowtc@gmail.com',
  'mitchell.tsui.mc@gmail.com'
];

const TABLE_COUNT = 15;
const SEATS_PER_TABLE = 12;

let sb = null;          // supabase client
let session = null;     // auth session
let guests = [];        // [{ id, name, group_name, side, rsvp_status, table_number, seat_number, ... }]
let filter = 'unassigned';
let dragData = null;    // { guestId, fromTable, fromSeat }
let saveTimer = null;

const AVATAR_COLORS = [
  '#7A4F5A','#5A6E7A','#7A6E50','#5A7A5A','#7A5A6A',
  '#6A5A7A','#7A6A5A','#4A6A7A','#7A4A5A','#6A7A5A'
];
function avatarColor(name) {
  let h = 0;
  for (let c of name || '') h = (h * 31 + c.charCodeAt(0)) & 0xFFFF;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}
function initials(name) {
  return (name || '').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
}
function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── AUTH ───
function isConfigured() {
  return !!(SUPABASE_URL && SUPABASE_ANON_KEY);
}

function initSupabase() {
  if (!isConfigured()) return null;
  if (!window.supabase) { console.error('Supabase SDK not loaded'); return null; }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, detectSessionInUrl: true, autoRefreshToken: true }
  });
  return sb;
}

async function bootstrap() {
  initSupabase();
  if (!sb) {
    document.getElementById('auth-msg').className = 'auth-msg error';
    document.getElementById('auth-msg').textContent =
      'Supabase not configured. Set SUPABASE_URL and SUPABASE_ANON_KEY in Vercel env vars.';
    return;
  }

  // detectSessionInUrl handles the magic-link callback automatically.
  const { data: { session: s } } = await sb.auth.getSession();
  if (s) {
    enterApp(s);
  }

  sb.auth.onAuthStateChange((_event, newSession) => {
    if (newSession) enterApp(newSession);
    else exitApp();
  });
}

async function sendMagicLink() {
  const email = document.getElementById('auth-email').value.trim().toLowerCase();
  const msg = document.getElementById('auth-msg');
  msg.className = 'auth-msg';

  if (!email) { msg.textContent = 'Please enter your email.'; msg.className = 'auth-msg error'; return; }
  if (!ADMIN_ALLOWLIST.includes(email)) {
    msg.textContent = 'This email is not authorised.';
    msg.className = 'auth-msg error';
    return;
  }

  const btn = document.getElementById('auth-btn');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + window.location.pathname }
  });

  btn.disabled = false;
  btn.textContent = 'Send Magic Link';

  if (error) {
    msg.className = 'auth-msg error';
    msg.textContent = error.message || 'Failed to send link.';
  } else {
    msg.textContent = 'Check your inbox for the magic link.';
  }
}

async function signOut() {
  await sb.auth.signOut();
}

function enterApp(s) {
  session = s;
  const email = (s.user && s.user.email || '').toLowerCase();
  if (!ADMIN_ALLOWLIST.includes(email)) {
    document.getElementById('auth-msg').className = 'auth-msg error';
    document.getElementById('auth-msg').textContent = `Email "${email}" is not authorised.`;
    sb.auth.signOut();
    return;
  }
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('who').textContent = email;
  loadGuests();
}

function exitApp() {
  session = null;
  document.getElementById('auth-gate').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  guests = [];
}

// ─── DATA ───
async function loadGuests() {
  setSync('saving', 'Loading…');
  const { data, error } = await sb
    .from('guests')
    .select('id, guest_number, name, group_name, side, rsvp_status, table_number, seat_number')
    .order('guest_number', { ascending: true });

  if (error) {
    console.error(error);
    setSync('error', 'Load failed: ' + error.message);
    return;
  }
  guests = data || [];
  setSync('saved', 'Loaded');
  render();
  setTimeout(() => setSync('', ''), 1500);
}

async function reload() { await loadGuests(); }

async function persistSeat(guestId, tableNumber, seatNumber) {
  setSync('saving', 'Saving…');
  const { error } = await sb
    .from('guests')
    .update({ table_number: tableNumber, seat_number: seatNumber })
    .eq('id', guestId);
  if (error) {
    console.error(error);
    setSync('error', 'Save failed');
    // Reload from server to recover from any out-of-sync state
    await loadGuests();
    return false;
  }
  setSync('saved', 'Saved');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => setSync('', ''), 1200);
  return true;
}

function setSync(state, text) {
  const el = document.getElementById('sync');
  el.className = 'sync-indicator ' + (state || '');
  el.textContent = text || '';
}

// ─── RENDER ───
function render() {
  renderSidebar();
  renderTables();
  updateStats();
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-chip').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderSidebar();
}

function renderSidebar() {
  const query = (document.getElementById('search-input')?.value || '').toLowerCase();
  const container = document.getElementById('guest-list');
  container.innerHTML = '';

  // Hide declined guests entirely from the planner — they shouldn't take seats.
  let pool = guests.filter(g => (g.rsvp_status || '').toLowerCase() !== 'no');

  if (filter === 'unassigned') pool = pool.filter(g => g.table_number == null);
  else if (filter === 'seated') pool = pool.filter(g => g.table_number != null);

  if (query) pool = pool.filter(g => (g.name || '').toLowerCase().includes(query));

  if (pool.length === 0) {
    container.innerHTML = '<div class="group-label" style="opacity:0.6;">No guests match.</div>';
    return;
  }

  // Group by side
  const groups = { '女方': [], '男方': [], 'Other': [] };
  pool.forEach(g => {
    const k = (g.side === '女方' || g.side === '男方') ? g.side : 'Other';
    groups[k].push(g);
  });

  ['女方', '男方', 'Other'].forEach(k => {
    if (groups[k].length === 0) return;
    const label = k === '女方' ? "Christy's side" : (k === '男方' ? "Mitchell's side" : 'Other');
    container.innerHTML += `<div class="group-label">${label} (${groups[k].length})</div>`;
    groups[k].forEach(g => {
      const seated = g.table_number != null;
      const seatLabel = seated ? `T${g.table_number}·S${g.seat_number ?? '?'}` : '';
      container.innerHTML += `
        <div class="guest-item ${seated ? 'seated' : ''}"
             data-gid="${g.id}" draggable="true">
          <div class="guest-avatar" style="background:${avatarColor(g.name)}">${initials(g.name)}</div>
          <div class="guest-name">${escHtml(g.name)}</div>
          ${seatLabel ? `<div class="guest-seat-label">${seatLabel}</div>` : ''}
        </div>`;
    });
  });

  container.querySelectorAll('.guest-item').forEach(el => {
    const gid = el.dataset.gid;
    el.addEventListener('dragstart', e => {
      const g = guests.find(x => x.id === gid);
      dragData = { guestId: gid, fromTable: g?.table_number ?? null, fromSeat: g?.seat_number ?? null };
      setTimeout(() => el.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
  });
}

function renderTables() {
  const grid = document.getElementById('tables-grid');
  grid.innerHTML = '';

  for (let t = 1; t <= TABLE_COUNT; t++) {
    const seatsAtTable = guests.filter(g => g.table_number === t);
    const count = seatsAtTable.length;
    const full = count >= SEATS_PER_TABLE;

    // SVG seat circles, colored by occupant if any
    const seatsSvg = [];
    for (let s = 1; s <= SEATS_PER_TABLE; s++) {
      const angle = ((s - 1) / SEATS_PER_TABLE) * 2 * Math.PI - Math.PI / 2;
      const r = 36;
      const cx = 44 + r * Math.cos(angle);
      const cy = 44 + r * Math.sin(angle);
      const occupant = seatsAtTable.find(g => g.seat_number === s);
      const fill = occupant ? avatarColor(occupant.name) : 'none';
      const stroke = occupant ? 'none' : '#C8BFB2';
      seatsSvg.push(
        `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="6" fill="${fill}" stroke="${stroke}" stroke-width="1"/>` +
        (occupant
          ? `<text x="${cx.toFixed(1)}" y="${(cy + 2).toFixed(1)}" text-anchor="middle" font-size="5" fill="white" font-family="Raleway, sans-serif" font-weight="600">${escHtml(initials(occupant.name))}</text>`
          : `<text x="${cx.toFixed(1)}" y="${(cy + 2).toFixed(1)}" text-anchor="middle" font-size="5" fill="#A09890" font-family="Raleway, sans-serif">${s}</text>`
        )
      );
    }

    // Numbered slot list
    const slotsHtml = [];
    for (let s = 1; s <= SEATS_PER_TABLE; s++) {
      const occupant = seatsAtTable.find(g => g.seat_number === s);
      if (occupant) {
        slotsHtml.push(`
          <div class="seat-slot filled"
               data-table="${t}" data-seat="${s}" data-gid="${occupant.id}"
               draggable="true"
               ondragstart="seatDragStart(event,'${occupant.id}',${t},${s})"
               ondragend="seatDragEnd(event)"
               ondragover="seatDragOver(event,${t},${s})"
               ondragleave="seatDragLeave(event,${t},${s})"
               ondrop="dropOnSeat(event,${t},${s})">
            <span class="seat-num">${s}</span>
            <span class="seat-name-text">${escHtml(occupant.name)}</span>
            <span class="seat-remove" onclick="removeFromSeat('${occupant.id}')" title="Remove">×</span>
          </div>`);
      } else {
        slotsHtml.push(`
          <div class="seat-slot empty"
               data-table="${t}" data-seat="${s}"
               ondragover="seatDragOver(event,${t},${s})"
               ondragleave="seatDragLeave(event,${t},${s})"
               ondrop="dropOnSeat(event,${t},${s})">
            <span class="seat-num">${s}</span>
            <span class="seat-name-text">—</span>
          </div>`);
      }
    }

    grid.innerHTML += `
      <div class="table-card ${full ? 'full' : ''}" id="tc-${t}">
        <div class="table-header">
          <div class="table-name">Table ${t}</div>
          <div class="table-count ${full ? 'at-capacity' : ''}">${count}/${SEATS_PER_TABLE}</div>
        </div>
        <div class="table-visual">
          <svg viewBox="0 0 88 88" width="88" height="88" xmlns="http://www.w3.org/2000/svg">
            <circle cx="44" cy="44" r="22" fill="#EAE5DB" stroke="#C8BFB2" stroke-width="1.5"/>
            ${seatsSvg.join('')}
          </svg>
        </div>
        <div class="seats-grid">
          ${slotsHtml.join('')}
        </div>
      </div>`;
  }
}

// ─── DRAG / DROP ───
function seatDragStart(e, gid, tableNum, seatNum) {
  dragData = { guestId: gid, fromTable: tableNum, fromSeat: seatNum };
  e.dataTransfer.effectAllowed = 'move';
  e.target.classList.add('dragging');
  e.stopPropagation();
}
function seatDragEnd(e) {
  e.target.classList.remove('dragging');
}
function seatDragOver(e, tableNum, seatNum) {
  e.preventDefault();
  if (!dragData) return;
  document.querySelector(`.seat-slot[data-table="${tableNum}"][data-seat="${seatNum}"]`)?.classList.add('drag-over');
}
function seatDragLeave(e, tableNum, seatNum) {
  document.querySelector(`.seat-slot[data-table="${tableNum}"][data-seat="${seatNum}"]`)?.classList.remove('drag-over');
}

async function dropOnSeat(e, tableNum, seatNum) {
  e.preventDefault();
  document.querySelector(`.seat-slot[data-table="${tableNum}"][data-seat="${seatNum}"]`)?.classList.remove('drag-over');
  if (!dragData) return;

  const { guestId, fromTable, fromSeat } = dragData;
  dragData = null;

  if (fromTable === tableNum && fromSeat === seatNum) return; // dropped on self

  const movingGuest = guests.find(g => g.id === guestId);
  if (!movingGuest) return;

  const occupant = guests.find(g => g.table_number === tableNum && g.seat_number === seatNum);

  // Optimistic local update
  if (occupant) {
    // Swap: occupant takes movingGuest's previous spot (could be null)
    occupant.table_number = fromTable;
    occupant.seat_number  = fromSeat;
  }
  movingGuest.table_number = tableNum;
  movingGuest.seat_number  = seatNum;
  render();

  // Persist (sequentially to avoid unique-constraint races on swap)
  if (occupant) {
    // Stage 1: park occupant in NULL to vacate the seat
    const ok1 = await persistSeat(occupant.id, null, null);
    if (!ok1) return;
    // Stage 2: write moving guest's new seat
    const ok2 = await persistSeat(movingGuest.id, tableNum, seatNum);
    if (!ok2) return;
    // Stage 3: place occupant in moving guest's old seat (if there was one)
    if (fromTable != null && fromSeat != null) {
      await persistSeat(occupant.id, fromTable, fromSeat);
    }
  } else {
    await persistSeat(movingGuest.id, tableNum, seatNum);
  }
}

async function dropOnSidebar(e) {
  e.preventDefault();
  if (!dragData) return;
  const { guestId } = dragData;
  dragData = null;

  const g = guests.find(x => x.id === guestId);
  if (!g || g.table_number == null) return;

  g.table_number = null;
  g.seat_number  = null;
  render();
  await persistSeat(guestId, null, null);
}

async function removeFromSeat(guestId) {
  const g = guests.find(x => x.id === guestId);
  if (!g) return;
  g.table_number = null;
  g.seat_number  = null;
  render();
  await persistSeat(guestId, null, null);
}

// ─── STATS ───
function updateStats() {
  const total = guests.filter(g => (g.rsvp_status || '').toLowerCase() !== 'no').length;
  const seated = guests.filter(g => g.table_number != null).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-seated').textContent = seated;
  document.getElementById('stat-unassigned').textContent = total - seated;
}

// ─── SUMMARY ───
function openSummary() {
  let html = '';
  for (let t = 1; t <= TABLE_COUNT; t++) {
    const seated = guests
      .filter(g => g.table_number === t)
      .sort((a, b) => (a.seat_number || 0) - (b.seat_number || 0));
    html += `<div class="modal-table-summary">
      <div class="mts-name">Table ${t} <span style="font-weight:300;color:var(--text-light)">(${seated.length}/${SEATS_PER_TABLE})</span></div>
      <div class="mts-guests">${seated.length > 0
        ? seated.map(g => `${g.seat_number}. ${escHtml(g.name)}`).join(' · ')
        : '<span style="color:var(--text-light);font-style:italic">Empty</span>'}</div>
    </div>`;
  }
  const unassigned = guests.filter(g => g.table_number == null && (g.rsvp_status || '').toLowerCase() !== 'no');
  if (unassigned.length > 0) {
    html += `<div class="modal-table-summary" style="margin-top:0.8rem;border-top:1px solid var(--divider);padding-top:0.8rem;">
      <div class="mts-name" style="color:var(--accent)">Unassigned (${unassigned.length})</div>
      <div class="mts-guests">${unassigned.map(g => escHtml(g.name)).join(' · ')}</div>
    </div>`;
  }
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

document.getElementById('auth-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMagicLink();
});

bootstrap();
</script>
